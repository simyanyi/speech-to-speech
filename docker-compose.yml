services:
  vllm:
      image: vllm/vllm-openai:latest
      container_name: vllm-qwen3
      restart: unless-stopped
      ports:
        - "8001:8001"
      volumes:
        - ./cache/:/root/.cache/
      environment:
        - HF_HOME=/root/.cache/huggingface
        - HF_TOKEN=${HF_TOKEN}
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      command:
      - --model
      - Qwen/Qwen3-30B-A3B-Instruct-2507
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --quantization
      - fp8
      - --gpu-memory-utilization
      - "0.5"
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8001/v1/models"]
        interval: 10s
        timeout: 5s
        retries: 30
        start_period: 120s
  speech-to-speech:
    depends_on:
      vllm:
        condition: service_healthy
    container_name: speech-to-speech
    build:
      context: .
      dockerfile: Dockerfile
    command: 
        - speech-to-speech
        - --mode
        - realtime
        - --thresh
        - "0.8"
        - --min_speech_ms
        - "500"
        - --min_silence_ms
        - "1000"
        - --stt
        - faster-whisper
        - --stt_model_name
        - large-v3
        - --language
        - auto
        - --llm_backend
        - responses-api
        - --model_name
        - Qwen/Qwen3-30B-A3B-Instruct-2507
        - --responses_api_base_url
        - http://vllm:8001/v1
        - --responses_api_api_key
        - dummy
        - --responses_api_stream
        - "false"
        - --tts
        - pocket
        - --pocket_tts_voice
        - azelma
        - --pocket_tts_device
        - cpu
    ports:
      - "8765:8765"
    volumes:
      - ./cache/:/root/.cache/
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]